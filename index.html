<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Haven — Social Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" href="assets/Art%20Haven%20-%20icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/Art%20Haven%20-%20icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --olive: #243a2b;
      --accent: #cea66e;
      --accent-rgb: 206,166,110;
      --beige-start: #E6D0AE;
      --beige-end: #FBECDD;
      --beige-start-rgb: 230,208,174;
      --beige-end-rgb: 251,236,221;
      --panel: linear-gradient(180deg,var(--beige-start),var(--beige-end));
      --text: var(--beige-end);
    }

    body {
      min-height: 100vh;
      /* olive base with a subtle silver overlay */
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)), var(--olive);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      font-family: 'Oswald', sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      position: relative;
    }

    /* Tiled faint icon pattern using existing icon asset */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('assets/Art%20Haven%20-%20LOGOicon2.svg');
      background-repeat: repeat;
      background-position: center top;
      background-size: 160px 160px;
      opacity: 0.06;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .container {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-badge {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 20px;
      background: var(--panel);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      margin-bottom: 18px;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      overflow: hidden;
    }

    .logo-badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
      pointer-events: none;
      border-radius: 26px;
    }

    .logo-badge:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.45);
    }

    .logo-badge svg { width: 110px; height: 110px; }
    .logo-badge img { width: 110px; height: 110px; object-fit: contain; display: block; position: relative; z-index: 1; }
    .logo-badge::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.9;
    }

    .brand-name {
      font-size: 44px;
      font-weight: 600;
      letter-spacing: 0.18em;
      margin-top: 1.5rem;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand-name .a { color: var(--beige-end); }
    .brand-name .b { color: var(--accent); }

    .brand-sub {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.55em;
      color: var(--beige-start);
      text-transform: uppercase;
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-sub i {
      margin: 0 8px;
      color: var(--accent);
      font-size: 16px;
    }

    .accent-line {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem 0 2rem;
      box-shadow: 0 0 8px rgba(var(--accent-rgb),0.18);
    }

    .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(var(--accent-rgb),0.12);
      border-radius: 8px;
      padding: 12px 16px;
      text-decoration: none;
      transition: background 0.22s ease, border-color 0.22s ease, transform 0.18s ease;
    }
    .link-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(var(--accent-rgb),0.22);
      transform: translateX(-3px);
    }

    .lb-chevron {
      color: rgba(var(--accent-rgb),0.35);
      font-size: 15px;
      transition: color 0.18s, transform 0.18s;
    }
    .link-btn:hover .lb-chevron { color: var(--accent); transform: translateX(-3px); }

    .lb-name {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .lb-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(206,166,110,0.35);
    }
    .lb-icon i { color: var(--olive); font-size: 17px; }

    .social-icons {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 2.5rem;
      margin-bottom: 1.2rem;
    }

    .social-icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(var(--beige-start-rgb),0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--beige-end);
      font-size: 18px;
      transition: transform 0.22s ease, background 0.22s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }

    .social-icon-btn:hover {
      background: rgba(var(--accent-rgb),0.28);
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.45);
    }

    .footer-line {
      margin-top: 0.8rem;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(var(--beige-end-rgb),0.75);
      text-transform: uppercase;
    }
    
    /* Gradient text using the brand palette */
    .gradient-text,
    .brand-name,
    .lb-name,
    .brand-sub,
    .footer-line {
      background: linear-gradient(90deg, var(--beige-start), var(--beige-end) 55%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body>
  <div class="container">
 <div class="logo-badge">

    </div>

    <div class="links">

    <div class="social-icons">

        <i class="fa-brands fa-whatsapp"></i>

    </div>

    <p class="footer-line">© 2026 Art Haven</p>

  </div>
</body>
</html>
